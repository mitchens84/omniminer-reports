name: Build and deploy reports site

# Robust publisher (260610): replaces the local launchd builder. n8n commits a
# transcript-free distillation .md to source/; this Action rebuilds the site with
# build_site.py, deploys to GitHub Pages, and only THEN posts the live report link
# to Telegram — so the link is never sent before the page exists.

on:
  push:
    branches: [main]
    paths:
      - 'source/**'
      - 'build_site.py'
      - 'exclude.txt'
      - 'requirements.txt'
      - '.github/workflows/build.yml'
      - '.github/scripts/notify.py'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so notify.py can diff the push's before..after

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build site
        run: python build_site.py --source source --quiet

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deploy
        uses: actions/deploy-pages@v4

      - name: Notify Telegram for new reports
        if: ${{ success() && github.event_name == 'push' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python .github/scripts/notify.py "${{ github.event.before }}" "${{ github.sha }}"
